name: Compilar MIPYME Windows

on:
  workflow_dispatch:  # solo se ejecuta cuando tú lo actives manualmente

jobs:
  build-windows:
    runs-on: windows-latest  # máquina virtual con Windows 11

    steps:
      - name: Preparar repositorio vacío
        run: echo "Repositorio para MIPYME Windows"

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Crear proyecto Flutter para Windows
        run: flutter create --project-name mipyme_windows --org com.mipyme .

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar ejecutable Windows
        run: flutter build windows --release

      - name: Empaquetar ejecutable en ZIP
        run: |
          Compress-Archive -Path build/windows/runner/Release/* -DestinationPath mipyme-windows.zip

      - name: Subir ZIP como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: mipyme-windows
          path: mipyme-windows.zip

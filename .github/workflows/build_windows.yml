name: Compilar MIPYME Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Clonar repositorio (tu código)
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Habilitar escritorio Windows
        run: flutter config --enable-windows-desktop

      # Creamos el proyecto (esto sobrescribe lib/ y pubspec.yaml)
      - name: Crear proyecto Flutter
        run: flutter create --project-name mipyme_windows --org com.mipyme .

      # Restauramos tus archivos originales
      - name: Restaurar código fuente personalizado
        shell: bash
        run: |
          # Eliminar lo generado por defecto
          rm -rf lib
          rm -f pubspec.yaml
          # Recuperamos lo que tenías en el repositorio
          cp -r $GITHUB_WORKSPACE/lib lib
          cp $GITHUB_WORKSPACE/pubspec.yaml pubspec.yaml

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar ejecutable Windows
        run: flutter build windows --release

      - name: Empaquetar ejecutable en ZIP
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath mipyme-windows.zip

      - name: Subir ZIP como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: mipyme-windows
          path: mipyme-windows.zip
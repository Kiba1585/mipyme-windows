name: Compilar MIPYME Windows

on:
  workflow_dispatch:

permissions:
  contents: write   # Para crear/actualizar releases

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Clonar repositorio (tu código)
        uses: actions/checkout@v4

      - name: Respaldar archivos personalizados
        shell: bash
        run: |
          mkdir -p /tmp/mipyme_src
          cp -r lib /tmp/mipyme_src/
          cp pubspec.yaml /tmp/mipyme_src/

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Habilitar escritorio Windows
        run: flutter config --enable-windows-desktop

      - name: Crear proyecto Flutter
        run: flutter create --project-name mipyme_windows --org com.mipyme .

      - name: Restaurar código fuente personalizado
        shell: bash
        run: |
          rm -rf lib
          rm -f pubspec.yaml
          cp -r /tmp/mipyme_src/lib lib
          cp /tmp/mipyme_src/pubspec.yaml pubspec.yaml

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar ejecutable Windows
        run: flutter build windows --release

      - name: Limpiar archivos de depuración
        run: |
          Remove-Item -Path build\windows\x64\runner\Release\*.pdb -ErrorAction SilentlyContinue
          Remove-Item -Path build\windows\x64\runner\Release\*.debug -ErrorAction SilentlyContinue

      - name: Empaquetar ejecutable en ZIP
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath mipyme-windows.zip

      # ---------- CAMBIO PRINCIPAL ----------
      # Se sube el ZIP a una Release (no como artefacto)
      - name: Subir ZIP a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-latest
          name: "MIPYME Windows - Última versión"
          body: "Ejecutable comprimido generado automáticamente (build #${{ github.run_number }})"
          files: mipyme-windows.zip
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}